[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Reservation details + requests were merged into one page.
[[redirects]]
  from = "/reservation-details"
  to = "/reservation-request.html"
  status = 301
  force = true

[[redirects]]
  from = "/reservation-details.html"
  to = "/reservation-request.html"
  status = 301
  force = true

# Pretty URLs for static pages.
[[redirects]]
  from = "/pricing"
  to = "/reservation-request.html#pricing"
  status = 301
  force = true

[[redirects]]
  from = "/pricing.html"
  to = "/reservation-request.html#pricing"
  status = 301
  force = true

[[redirects]]
  from = "/flight-lessons"
  to = "/flight-lessons.html"
  status = 200

[[redirects]]
  from = "/reservation-request"
  to = "/reservation-request.html"
  status = 200

[[redirects]]
  from = "/corporate"
  to = "/reservation-request.html#corporate"
  status = 301
  force = true

[[redirects]]
  from = "/corporate.html"
  to = "/reservation-request.html#corporate"
  status = 301
  force = true

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

# Cache policy: Vite fingerprints /assets, so those are immutable. Photos and
# videos change rarely; give them a month with revalidation in the background.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/videos/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# The standalone "More" hub page was removed; its links live in the main nav now.
[[redirects]]
  from = "/more"
  to = "/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/more.html"
  to = "/index.html"
  status = 301
  force = true

[dev]
  command = "npm run dev"
  targetPort = 5173
  framework = "#custom"
  autoLaunch = false
