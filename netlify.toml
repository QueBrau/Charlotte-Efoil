[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Reservation details + requests were merged into one page.
[[redirects]]
  from = "/reservation-details"
  to = "/reservation-request.html"
  status = 301
  force = true

[[redirects]]
  from = "/reservation-details.html"
  to = "/reservation-request.html"
  status = 301
  force = true

[dev]
  command = "npm run dev"
  targetPort = 5173
  framework = "#custom"
  autoLaunch = false
