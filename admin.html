<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Analytics Dashboard | CharlotteEfoil</title>
    <link rel="icon" href="/photos/CharlotteEfoil.png" type="image/png" />
    <style>
      :root {
        --brand: rgb(25, 64, 85);
        --brand-2: rgb(35, 84, 110);
        --bg: #0d1519;
        --panel: #142027;
        --panel-2: #1b2b33;
        --line: rgba(255, 255, 255, 0.09);
        --text: #eef4f6;
        --muted: #93a7b0;
        --accent: #4fb0d4;
        --good: #46c78f;
        --warn: #e8b04b;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent); }
      button { font: inherit; cursor: pointer; }

      /* Login gate */
      .gate {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }
      .gate-card {
        width: 100%;
        max-width: 360px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 2rem;
      }
      .gate-card h1 { font-size: 1.25rem; margin: 0 0 0.35rem; }
      .gate-card p { color: var(--muted); margin: 0 0 1.25rem; font-size: 0.9rem; }
      .field { display: flex; flex-direction: column; gap: 0.4rem; }
      input[type="password"] {
        background: var(--bg);
        border: 1px solid var(--line);
        color: var(--text);
        border-radius: 10px;
        padding: 0.7rem 0.9rem;
        font-size: 1rem;
      }
      .btn {
        background: var(--brand);
        color: #fff;
        border: 0;
        border-radius: 10px;
        padding: 0.7rem 1rem;
        font-weight: 600;
        transition: background 0.15s ease;
      }
      .btn:hover { background: var(--brand-2); }
      .btn-ghost { background: transparent; border: 1px solid var(--line); color: var(--text); }
      .error { color: #ff8f8f; font-size: 0.85rem; min-height: 1.1rem; }

      .hidden { display: none !important; }

      /* App shell */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--line);
        position: sticky;
        top: 0;
        background: rgba(13, 21, 25, 0.92);
        backdrop-filter: blur(8px);
        z-index: 20;
      }
      .topbar h1 { font-size: 1.05rem; margin: 0; }
      .topbar .actions { display: flex; gap: 0.6rem; }
      .wrap { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }

      .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 0.9rem;
        margin-bottom: 1.5rem;
      }
      .stat {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 1rem 1.1rem;
      }
      .stat .label { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }
      .stat .value { font-size: 1.7rem; font-weight: 700; margin-top: 0.3rem; }

      .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
      @media (max-width: 820px) { .grid-2 { grid-template-columns: 1fr; } }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 1.1rem 1.2rem;
        margin-bottom: 1.25rem;
      }
      .card h2 { font-size: 0.95rem; margin: 0 0 0.9rem; }

      table { width: 100%; border-collapse: collapse; font-size: 0.86rem; }
      th, td { text-align: left; padding: 0.55rem 0.5rem; border-bottom: 1px solid var(--line); vertical-align: top; }
      th { color: var(--muted); font-weight: 600; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.03em; }
      tbody tr.clickable:hover { background: var(--panel-2); cursor: pointer; }
      td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
      .muted { color: var(--muted); }
      .pill {
        display: inline-block;
        padding: 0.12rem 0.5rem;
        border-radius: 999px;
        background: var(--panel-2);
        border: 1px solid var(--line);
        font-size: 0.72rem;
        color: var(--muted);
      }
      .bar-track { background: var(--panel-2); border-radius: 6px; height: 8px; overflow: hidden; min-width: 60px; }
      .bar-fill { background: var(--accent); height: 100%; }

      /* Slide-over detail */
      .overlay {
        position: fixed; inset: 0; background: rgba(0, 0, 0, 0.55); z-index: 40;
      }
      .drawer {
        position: fixed; top: 0; right: 0; bottom: 0; width: min(560px, 100%);
        background: var(--panel); border-left: 1px solid var(--line); z-index: 41;
        display: flex; flex-direction: column;
      }
      .drawer-head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 1rem 1.25rem; border-bottom: 1px solid var(--line);
      }
      .drawer-body { padding: 1.25rem; overflow-y: auto; }
      .kv { display: grid; grid-template-columns: 130px 1fr; gap: 0.3rem 0.75rem; font-size: 0.85rem; margin-bottom: 1.25rem; }
      .kv dt { color: var(--muted); }
      .kv dd { margin: 0; }
      .section-title { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin: 1.25rem 0 0.5rem; }
      .loading { color: var(--muted); padding: 2rem 0; text-align: center; }
    </style>
  </head>
  <body>
    <!-- Login gate -->
    <div class="gate" data-gate>
      <form class="gate-card" data-login-form>
        <h1>Analytics Dashboard</h1>
        <p>Enter the admin password to continue.</p>
        <div class="field">
          <input type="password" name="password" placeholder="Admin password" autocomplete="current-password" required />
          <button class="btn" type="submit">Sign in</button>
          <span class="error" data-login-error></span>
        </div>
      </form>
    </div>

    <!-- App -->
    <div data-app class="hidden">
      <header class="topbar">
        <h1>CharlotteEfoil · Analytics</h1>
        <div class="actions">
          <button class="btn btn-ghost" data-refresh>Refresh</button>
          <button class="btn btn-ghost" data-logout>Sign out</button>
        </div>
      </header>
      <main class="wrap">
        <div class="stat-grid" data-stats></div>

        <div class="card">
          <h2>Traffic — last 30 days</h2>
          <div data-daily><div class="loading">Loading…</div></div>
        </div>

        <div class="grid-2">
          <div class="card">
            <h2>Top pages</h2>
            <div data-top-pages><div class="loading">Loading…</div></div>
          </div>
          <div class="card">
            <h2>Traffic sources</h2>
            <div data-sources><div class="loading">Loading…</div></div>
          </div>
        </div>

        <div class="card">
          <h2>Unique visitors</h2>
          <div data-visitors><div class="loading">Loading…</div></div>
        </div>

        <div class="card">
          <h2>Recent link &amp; button clicks</h2>
          <div data-events><div class="loading">Loading…</div></div>
        </div>
      </main>
    </div>

    <div class="overlay hidden" data-overlay></div>
    <aside class="drawer hidden" data-drawer aria-label="Visitor detail">
      <div class="drawer-head">
        <strong>Visitor activity</strong>
        <button class="btn btn-ghost" data-drawer-close>Close</button>
      </div>
      <div class="drawer-body" data-drawer-body></div>
    </aside>

    <script type="module" src="/js/admin.js"></script>
  </body>
</html>
